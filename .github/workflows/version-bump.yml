name: Version Bump & Release

# Manually triggered from the Actions tab. Bumps the version in
# pyproject.toml (patch by default), promotes the PATCHNOTES "[Unreleased]"
# section, commits + tags, then builds, publishes to PyPI, and cuts a
# GitHub Release — all in one run.
#
# This is self-contained rather than relying on release.yml's tag trigger:
# a tag pushed with the default GITHUB_TOKEN does not start another
# workflow, so chaining would silently never publish. release.yml is kept
# for releases cut by pushing a tag by hand (or via a PAT).

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Semver part to bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and promote patch notes
        id: bump
        env:
          LEVEL: ${{ inputs.level }}
        run: |
          python3 - <<'PY'
          import datetime, os, pathlib, re

          level = os.environ["LEVEL"]
          pyproject = pathlib.Path("pyproject.toml")
          text = pyproject.read_text()
          m = re.search(r'(?m)^version = "(\d+)\.(\d+)\.(\d+)"', text)
          if m is None:
              raise SystemExit("could not find version in pyproject.toml")
          major, minor, patch = (int(g) for g in m.groups())
          if level == "major":
              major, minor, patch = major + 1, 0, 0
          elif level == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
          new = f"{major}.{minor}.{patch}"
          pyproject.write_text(text[: m.start()] + f'version = "{new}"' + text[m.end():])

          # Promote the [Unreleased] heading: insert a dated version heading
          # just below it, leaving a fresh empty [Unreleased] on top.
          notes = pathlib.Path("PATCHNOTES.md")
          if notes.exists():
              today = datetime.date.today().isoformat()
              nt = notes.read_text()
              nt = nt.replace(
                  "## [Unreleased]\n",
                  f"## [Unreleased]\n\n## [{new}] — {today}\n",
                  1,
              )
              notes.write_text(nt)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={new}\n")
          print(f"bumped to {new}")
          PY

      - name: Commit and tag
        run: |
          V="${{ steps.bump.outputs.version }}"
          git add pyproject.toml PATCHNOTES.md
          git commit -m "chore(release): ${V}"
          git tag -a "v${V}" -m "v${V}"
          git push origin "HEAD:${{ github.ref_name }}" --follow-tags

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          files: dist/*
          generate_release_notes: true
