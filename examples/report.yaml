output: report.pdf

metadata:
  title: "Annual Report 2025"
  author: "pdf-compiler"
  keywords: [report, demo]

defaults:
  index_headers: true
  page_size: letter
  margin: 0.75in
  page_numbering:
    enabled: true
    front_matter: roman
    body: arabic
    position: bottom-center

sections:
  - type: title
    title: "Annual Report 2025"
    subtitle: "Demonstration document"
    author: "pdf-compiler"
    date: 2026-05-21

  - type: toc
    depth: 3

  - type: markdown
    path: ../examples_content/intro.md

  - type: header
    title: "Part II — Financials"
    subtitle: "A heavily-bookmarked section"
    subtoc: true
    body: |
      This divider page is generated from markdown.
      The next section is a multi-heading markdown chapter; every heading
      becomes a ToC entry automatically.

  - type: markdown
    path: ../examples_content/financials.md

  - type: images
    title: "Site Photographs"
    per_page: 4
    layout: grid
    captions: below
    images:
      - { path: ../examples_content/img_a.png, caption: "View A — north" }
      - { path: ../examples_content/img_b.png, caption: "View B — south" }
      - { path: ../examples_content/img_c.png, caption: "View C — east"  }
      - { path: ../examples_content/img_d.png, caption: "View D — west"  }
      - { path: ../examples_content/img_e.png, caption: "View E — aerial" }
