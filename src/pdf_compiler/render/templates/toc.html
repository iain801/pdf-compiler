<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <style>{{ base_css|safe }}</style>
  <style>:root { --page-size: {{ page_size }}; --margin: {{ margin }}; }</style>
</head>
<body class="toc">
  <h1>{{ title }}</h1>
  <ul>
    {% for entry in entries %}
      <li class="depth-{{ entry.depth }}">
        <span class="label"><a href="#{{ entry.dest_name }}">{{ entry.label }}</a></span>
        <span class="dots"></span>
        <span class="page">{{ entry.page_label }}</span>
      </li>
    {% endfor %}
  </ul>
</body>
</html>
