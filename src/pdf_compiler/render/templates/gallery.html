<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ title or 'Gallery' }}</title>
  <style>{{ base_css|safe }}</style>
  <style>:root { --page-size: {{ page_size }}; --margin: {{ margin }}; }</style>
  <style>{{ gallery_css|safe }}</style>
</head>
<body>
  {# Section title gets its own page so it doesn't eat into the first grid's height. #}
  {% if title %}
    <div class="gallery-title-page">
      <h1 id="{{ dest_name }}">{{ title }}</h1>
    </div>
  {% endif %}
  {% for page in pages %}
    <div class="gallery captions-{{ captions }}"
         style="{% if title or not loop.first %}page-break-before: always; {% endif %}
                height: {{ content_height_pt }}pt;
                grid-template-columns: repeat({{ page.cols }}, 1fr);
                grid-template-rows: repeat({{ page.rows }}, 1fr);">
      {% for cell in page.cells %}
        <div class="cell">
          <img src="{{ cell.path_url }}" alt="">
          {% if cell.caption and captions != 'none' %}
            <div class="caption">{{ cell.caption }}</div>
          {% endif %}
        </div>
      {% endfor %}
    </div>
  {% endfor %}
</body>
</html>
