<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <style>{{ base_css|safe }}</style>
  <style>:root { --page-size: {{ page_size }}; --margin: {{ margin }}; }</style>
</head>
<body>
  <div class="header-page">
    <h1 id="{{ dest_name }}">{{ title }}</h1>
    {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
    {% if body_html %}<div class="body">{{ body_html|safe }}</div>{% endif %}
  </div>
  {% if subtoc_entries %}
    <div class="page-break"></div>
    <div class="toc subtoc">
      <h2>In this section</h2>
      <ul>
        {% for entry in subtoc_entries %}
          <li class="depth-{{ entry.depth }}">
            <span class="label"><a href="#__stoc_{{ loop.index0 }}">{{ entry.label }}</a></span>
            <span id="__stoc_{{ loop.index0 }}"></span>
            <span class="dots"></span>
            <span class="page">{{ entry.page_label }}</span>
          </li>
        {% endfor %}
      </ul>
    </div>
  {% endif %}
</body>
</html>
